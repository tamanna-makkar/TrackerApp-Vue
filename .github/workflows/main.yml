name: Run on Push to Main

on:
  workflow_dispatch: 

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code cloned from the github"
  build:
     needs: [build]
     runs-on: ubuntu-latest
      steps:
      - name: Build docker container
        run: echo "Docker container build"
  test:
    needs: [build]
    runs-on: ubuntu-latest
      steps:
      - name: Test the container
        run: echo "Testing the container"
  deploy:
    needs: [test]
    runs-on: ubuntu-latest
      steps:
      - name: Build docker container
        run: echo "Docker container build"
