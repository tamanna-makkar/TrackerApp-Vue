<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 880" width="520" height="880" font-family="Segoe UI, Arial, sans-serif">

  <!-- Background -->
  <rect width="520" height="880" fill="#0f1117" rx="16"/>

  <!-- Title -->
  <text x="260" y="38" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">CI/CD Pipeline Flow</text>

  <!-- Developer -->
  <rect x="160" y="55" width="200" height="52" rx="10" fill="#4CAF50"/>
  <text x="260" y="76" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">👨‍💻 Developer</text>
  <text x="260" y="96" text-anchor="middle" fill="#fff" font-size="11">git push</text>

  <line x1="260" y1="107" x2="260" y2="128" stroke="#555" stroke-width="2"/>
  <polygon points="260,135 255,125 265,125" fill="#555"/>

  <!-- GitHub -->
  <rect x="160" y="135" width="200" height="52" rx="10" fill="#24292e"/>
  <text x="260" y="156" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">GitHub Repository</text>
  <text x="260" y="176" text-anchor="middle" fill="#aaa" font-size="11">trigger workflows</text>

  <line x1="260" y1="187" x2="260" y2="208" stroke="#555" stroke-width="2"/>
  <polygon points="260,215 255,205 265,205" fill="#555"/>

  <!-- CI Label -->
  <text x="52" y="232" fill="#4FC3F7" font-size="12" font-weight="bold">CI</text>
  <line x1="52" y1="236" x2="52" y2="490" stroke="#4FC3F7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Code Quality -->
  <rect x="90" y="220" width="340" height="44" rx="8" fill="#1565C0"/>
  <text x="260" y="238" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Code Quality</text>
  <text x="260" y="255" text-anchor="middle" fill="#90CAF9" font-size="10">ESLint · Prettier · CodeQL SAST</text>

  <line x1="260" y1="264" x2="260" y2="278" stroke="#555" stroke-width="1.5"/>
  <polygon points="260,283 256,275 264,275" fill="#555"/>

  <!-- Dependency Scan -->
  <rect x="90" y="283" width="340" height="44" rx="8" fill="#6A1B9A"/>
  <text x="260" y="301" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Dependency Scan</text>
  <text x="260" y="318" text-anchor="middle" fill="#CE93D8" font-size="10">npm audit · outdated packages</text>

  <line x1="260" y1="327" x2="260" y2="341" stroke="#555" stroke-width="1.5"/>
  <polygon points="260,346 256,338 264,338" fill="#555"/>

  <!-- Secret Scan -->
  <rect x="90" y="346" width="340" height="44" rx="8" fill="#B71C1C"/>
  <text x="260" y="364" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Secret Scan</text>
  <text x="260" y="381" text-anchor="middle" fill="#FFCDD2" font-size="10">Gitleaks · full git history</text>

  <line x1="260" y1="390" x2="260" y2="404" stroke="#555" stroke-width="1.5"/>
  <polygon points="260,409 256,401 264,401" fill="#555"/>

  <!-- Build & Push -->
  <rect x="90" y="409" width="340" height="44" rx="8" fill="#E65100"/>
  <text x="260" y="427" text-anchor="middle" fill="#fff" font-size="12" font-weight="bold">Build &amp; Push</text>
  <text x="260" y="444" text-anchor="middle" fill="#FFE0B2" font-size="10">docker build · tag · push</text>

  <line x1="260" y1="453" x2="260" y2="474" stroke="#555" stroke-width="2"/>
  <polygon points="260,481 255,471 265,471" fill="#555"/>

  <!-- CD Label -->
  <text x="52" y="498" fill="#A5D6A7" font-size="12" font-weight="bold">CD</text>
  <line x1="52" y1="502" x2="52" y2="790" stroke="#A5D6A7" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Docker Image -->
  <rect x="160" y="481" width="200" height="52" rx="10" fill="#2496ED"/>
  <text x="260" y="502" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🐳 Docker Image</text>
  <text x="260" y="521" text-anchor="middle" fill="#fff" font-size="11">versioned + latest</text>

  <line x1="260" y1="533" x2="260" y2="554" stroke="#555" stroke-width="2"/>
  <polygon points="260,561 255,551 265,551" fill="#555"/>

  <!-- Container Registry -->
  <rect x="160" y="561" width="200" height="52" rx="10" fill="#0D47A1"/>
  <text x="260" y="582" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">Container Registry</text>
  <text x="260" y="600" text-anchor="middle" fill="#90CAF9" font-size="11">Docker Hub</text>

  <line x1="260" y1="613" x2="260" y2="634" stroke="#555" stroke-width="2"/>
  <polygon points="260,641 255,631 265,631" fill="#555"/>

  <!-- Kubernetes / Orchestration -->
  <rect x="160" y="641" width="200" height="62" rx="10" fill="#326CE5"/>
  <text x="260" y="679" text-anchor="middle" fill="#fff" font-size="12">Kubernetes · AWS ECS · Azure AKS</text>

  <line x1="260" y1="703" x2="260" y2="724" stroke="#555" stroke-width="2"/>
  <polygon points="260,731 255,721 265,721" fill="#555"/>

  <!-- Load Balancer -->
  <rect x="160" y="731" width="200" height="52" rx="10" fill="#F57F17"/>
  <text x="260" y="752" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">⚖️ Load Balancer</text>
  <text x="260" y="770" text-anchor="middle" fill="#fff" font-size="11">distributes traffic</text>

  <line x1="260" y1="783" x2="260" y2="804" stroke="#555" stroke-width="2"/>
  <polygon points="260,811 255,801 265,801" fill="#555"/>

  <!-- Users -->
  <rect x="160" y="811" width="200" height="52" rx="10" fill="#7B1FA2"/>
  <text x="260" y="832" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">🌍 Users</text>
  <text x="260" y="850" text-anchor="middle" fill="#CE93D8" font-size="11">worldwide</text>

</svg>
